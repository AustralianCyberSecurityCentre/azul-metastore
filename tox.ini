[tox]
envlist =
    style
    test

[testenv:py3-int]
# index-url is passed by default, trusted-host is not
# optionally allow trusted-host to be passed
passenv = *
# must supply this as uppercase as otherwise tests fail if proxy is set
setenv =
    NO_PROXY=localhost

dependency_groups =
    dev

deps =
    pytest-cov

commands =
    pytest --cov=azul_metastore --cov-report=xml:.tox/py3-int/coverage.xml --junitxml=.tox/py3-int/test-results.xml tests/

[testenv:style]
# index-url is passed by default, trusted-host is not
# optionally allow trusted-host to be passed
passenv = 
    PIP_TRUSTED_HOST
    UV_DEFAULT_INDEX
    UV_INDEX_URL
    UV_INSECURE_HOST

# must supply this as uppercase as otherwise tests fail if proxy is set
setenv =
    NO_PROXY=localhost

deps =
    toml
    ruff
    ty

dependency_groups =
    dev

commands =
    ruff check
    ruff format --check
    ty check

[testenv:test]
# index-url is passed by default, trusted-host is not
# optionally allow trusted-host to be passed
passenv = 
    PIP_TRUSTED_HOST
    UV_DEFAULT_INDEX
    UV_INDEX_URL
    UV_INSECURE_HOST
    FILE_MANAGER_VIRUSTOTAL_API_KEY
    FILE_MANAGER_AZURE_STORAGE_ACCESS_KEY
    FILE_MANAGER_AZURE_STORAGE_ACCOUNT_ADDRESS
    FILE_MANAGER_FILE_CACHE_DIR

# must supply this as uppercase as otherwise tests fail if proxy is set
setenv =
    NO_PROXY=localhost

dependency_groups =
    dev

deps =
    pytest-cov

commands =
    pytest --cov=azul_metastore --cov-report=xml:.tox/.work_env/coverage.xml --junitxml=.tox/.work_env/test-results.xml tests/unit/